services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: copcon-server
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./server/config.yaml:/app/config.yaml:ro
      - copcon_data:/app/data
    restart: unless-stopped

volumes:
  copcon_data: