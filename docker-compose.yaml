services:
  postgres:
    image: postgres:15-alpine
    container_name: copcon-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent123
      POSTGRES_DB: agent_infra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: copcon-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: copcon-litellm
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-key}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY:-sk-litellm-salt}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - ./config/litellm-config.yaml:/app/config.yaml:ro
      - litellm_logs:/app/logs
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: copcon-server
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/config.yaml
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=agent
      - DATABASE_PASSWORD=agent123
      - DATABASE_DBNAME=agent_infra
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-litellm-key}
      - OPENAI_BASE_URL=http://litellm:4000/v1
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      litellm:
        condition: service_healthy
    volumes:
      - ./server/config.yaml:/app/config.yaml:ro

volumes:
  postgres_data:
  qdrant_data:
  litellm_logs: